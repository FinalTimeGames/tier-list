<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tier List Maker | Finaltime Studios</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Montserrat:wght@900&display=swap');

        :root {
            --bg-base: #09090b;
            --bg-surface: #18181b;
            --bg-elevated: #27272a;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --border: #3f3f46;
            --radius: 8px;
            --font-main: 'Inter', sans-serif;
            --font-display: 'Montserrat', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
        }
        
        .brand {
            font-family: var(--font-display);
            font-size: 1.5rem;
            background: linear-gradient(to right, #38bdf8, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        select, button {
            font-family: var(--font-main);
            background: var(--bg-elevated);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        button:hover { background: var(--border); }
        .btn-primary { background: var(--accent); border-color: var(--accent); }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-danger { background: var(--danger); border-color: var(--danger); }

        /* Views */
        .view { display: none; padding: 40px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .view.active { display: block; }

        /* Home Dashboard */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .project-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }
        .project-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .project-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 10px; }
        .project-meta { font-size: 0.85rem; color: var(--text-muted); }
        .card-actions { margin-top: 15px; display: flex; justify-content: flex-end; }

        /* Editor View */
        .editor-header { text-align: center; margin-bottom: 20px; }
        .editor-title {
            font-size: 2.5rem; font-family: var(--font-display);
            background: transparent; border: none; color: white;
            text-align: center; outline: none; width: 100%;
        }
        .editor-title:focus { border-bottom: 2px solid var(--accent); }

        .toolbar {
            display: flex;
            gap: 10px;
            background: var(--bg-surface);
            padding: 15px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            flex-wrap: wrap;
            border: 1px solid var(--border);
        }
        
        .toolbar-group { display: flex; gap: 10px; align-items: center; border-right: 1px solid var(--border); padding-right: 15px;}
        .toolbar-group:last-child { border: none; }

        /* Board */
        #capture-area { background: var(--bg-base); padding: 10px; border-radius: var(--radius); }
        .board { display: flex; flex-direction: column; gap: 2px; background: #000; border: 2px solid #000; border-radius: 4px; overflow: hidden; }
        .tier-row { display: flex; min-height: 100px; background: var(--bg-surface); position: relative; }
        
        .tier-label-container {
            width: 120px;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #000;
            position: relative;
        }
        .tier-label {
            flex-grow: 1; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; font-weight: 800; color: #111; text-align: center;
            outline: none; padding: 10px; word-break: break-word; min-height: 80px;
        }
        .tier-settings {
            height: 20px; background: rgba(0,0,0,0.2); display: flex; justify-content: space-around;
            align-items: center; font-size: 10px; opacity: 0; transition: opacity 0.2s;
        }
        .tier-label-container:hover .tier-settings { opacity: 1; }
        .tier-btn { background: none; border: none; cursor: pointer; padding: 2px 5px; color: #111; font-weight: bold;}
        .tier-btn:hover { background: rgba(255,255,255,0.4); }

        .drop-zone { flex-grow: 1; display: flex; flex-wrap: wrap; align-content: flex-start; min-height: 100px; transition: background 0.2s; padding: 5px; gap: 5px; }
        .drop-zone.drag-over { background: rgba(255, 255, 255, 0.05); }

        .add-tier-btn { width: 100%; background: var(--bg-elevated); border: 2px dashed var(--border); color: var(--text-muted); padding: 15px; margin-top: 10px; cursor: pointer; border-radius: var(--radius); }
        .add-tier-btn:hover { background: var(--border); color: white; }

        .watermark { text-align: right; padding: 10px 5px 0 0; font-family: var(--font-display); font-size: 0.8rem; color: rgba(255, 255, 255, 0.2); }

        /* Pool */
        .pool-container { margin-top: 30px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
        .pool-zone { min-height: 150px; border: 2px dashed var(--border); border-radius: var(--radius); padding: 10px; margin-top: 10px; display: flex; flex-wrap: wrap; gap: 5px; align-content: flex-start;}
        .pool-zone.drag-over { background: rgba(59, 130, 246, 0.1); border-color: var(--accent); }
        .drag-notice { width: 100%; text-align: center; color: var(--text-muted); font-size: 0.9rem; padding: 20px; pointer-events: none; }

        /* Items */
        .item {
            width: 85px; height: 85px; background-color: var(--bg-elevated);
            background-size: cover; background-position: center;
            border-radius: 4px; cursor: grab; position: relative;
            display: flex; align-items: center; justify-content: center;
            text-align: center; font-size: 0.8rem; font-weight: 600; overflow: hidden;
            border: 2px solid transparent; user-select: none;
        }
        .item.text-item { background: var(--bg-elevated); border: 1px solid var(--border); padding: 5px; }
        .item:hover { z-index: 10; border-color: var(--accent); transform: scale(1.05); }
        .item.dragging { opacity: 0.5; }
        .delete-item {
            position: absolute; top: 0; right: 0; background: red; color: white; border: none;
            width: 20px; height: 20px; font-size: 10px; cursor: pointer; display: none;
        }
        .item:hover .delete-item { display: block; }
        
        input[type="file"] { display: none; }
        input[type="text"].text-input { background: var(--bg-base); border: 1px solid var(--border); color: white; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <nav>
        <div class="brand" onclick="app.goHome()">FINALTIME STUDIOS</div>
        <div class="nav-controls">
            <select id="langSelect" onchange="app.changeLanguage(this.value)">
                <option value="en">English</option>
                <option value="pt">Português</option>
            </select>
        </div>
    </nav>

    <main id="view-home" class="view active">
        <div class="dashboard-header">
            <h2 id="t-myProjects">My Tier Lists</h2>
            <button class="btn-primary" onclick="app.createNewProject()" id="t-createNew">+ Create New</button>
        </div>
        <div class="project-grid" id="projectGrid">
            </div>
    </main>

    <main id="view-editor" class="view">
        <div class="editor-header">
            <input type="text" id="projectTitle" class="editor-title" value="My Tier List" onblur="app.saveCurrent()">
        </div>

        <div class="toolbar">
            <div class="toolbar-group">
                <button onclick="app.goHome()">🏠 <span id="t-home">Home</span></button>
            </div>
            <div class="toolbar-group">
                <label for="imageUpload" class="btn btn-primary" style="margin:0;">📷 <span id="t-addImg">Add Images</span></label>
                <input type="file" id="imageUpload" accept="image/*" multiple onchange="app.handleImageUpload(event)">
                
                <input type="text" id="textInput" class="text-input" placeholder="Text item...">
                <button onclick="app.addTextItem()">📝 <span id="t-addText">Add Text</span></button>
            </div>
            <div class="toolbar-group">
                <button onclick="app.exportImage()">📥 <span id="t-export">Export PNG</span></button>
                <button class="btn-danger" onclick="app.clearCurrentBoard()">🗑️ <span id="t-clear">Clear</span></button>
            </div>
        </div>

        <div id="capture-area">
            <div class="board" id="mainBoard">
                </div>
            <div class="watermark">FINALTIME STUDIOS</div>
        </div>
        
        <button class="add-tier-btn" onclick="app.addTier()">+ <span id="t-addTierRow">Add Row</span></button>

        <div class="pool-container">
            <h3 id="t-poolTitle">Item Pool (Drag files here to upload)</h3>
            <div class="drop-zone pool-zone" id="itemPool">
                <div class="drag-notice" id="t-dragNotice">Drag images from your PC or drop items here.</div>
            </div>
        </div>
    </main>

    <script>
        // --- TRANSLATIONS ---
        const dict = {
            en: {
                myProjects: "My Tier Lists", createNew: "+ Create New", home: "Home",
                addImg: "Add Images", addText: "Add Text", export: "Export PNG", clear: "Clear Items",
                addTierRow: "Add Row", poolTitle: "Item Pool (Drag files here to upload)",
                dragNotice: "Drag images from your PC or drop items here.", defaultTitle: "Untitled Tier List",
                alertQuota: "Storage full! Cannot add more images. Try deleting some.", confirmClear: "Clear all items?", confirmDel: "Delete project?"
            },
            pt: {
                myProjects: "Minhas Tier Lists", createNew: "+ Criar Nova", home: "Início",
                addImg: "Adicionar Imagens", addText: "Adicionar Texto", export: "Exportar PNG", clear: "Limpar Itens",
                addTierRow: "Adicionar Linha", poolTitle: "Banco de Itens (Arraste arquivos aqui)",
                dragNotice: "Arraste imagens do seu PC ou solte itens aqui.", defaultTitle: "Tier List Sem Nome",
                alertQuota: "Armazenamento cheio! O navegador não permite mais imagens. Delete algumas.", confirmClear: "Apagar todos os itens?", confirmDel: "Deletar projeto?"
            }
        };

        const defaultColors = ['#ff7f7f', '#ffbf7f', '#ffff7f', '#7fff7f', '#7fbfff', '#bf7fff'];

        // --- APP LOGIC ---
        const app = {
            lang: 'en',
            data: {}, // All projects
            currentId: null,
            draggedItem: null,

            init() {
                // Load data
                const saved = localStorage.getItem('finaltimeV3');
                if (saved) this.data = JSON.parse(saved);
                
                const savedLang = localStorage.getItem('finaltimeLang');
                if(savedLang) {
                    this.lang = savedLang;
                    document.getElementById('langSelect').value = savedLang;
                }
                
                this.updateLangUI();
                this.setupGlobalDragDrop();
                this.goHome();
            },

            // --- NAVIGATION & PROJECTS ---
            goHome() {
                document.getElementById('view-editor').classList.remove('active');
                document.getElementById('view-home').classList.active = true;
                document.getElementById('view-home').classList.add('active');
                this.currentId = null;
                this.renderHome();
            },

            renderHome() {
                const grid = document.getElementById('projectGrid');
                grid.innerHTML = '';
                
                const ids = Object.keys(this.data);
                if(ids.length === 0) {
                    grid.innerHTML = `<p style="color:var(--text-muted);">No tier lists yet. Create one!</p>`;
                    return;
                }

                ids.forEach(id => {
                    const proj = this.data[id];
                    const card = document.createElement('div');
                    card.className = 'project-card';
                    card.innerHTML = `
                        <div class="project-title" onclick="app.openProject('${id}')">${proj.title || 'Untitled'}</div>
                        <div class="project-meta">Updated: ${new Date(proj.updated).toLocaleDateString()}</div>
                        <div class="card-actions">
                            <button class="btn-danger" style="padding: 4px 8px; font-size:12px;" onclick="app.deleteProject('${id}')">Delete</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            },

            createNewProject() {
                const id = 'proj_' + Date.now();
                this.data[id] = {
                    title: dict[this.lang].defaultTitle,
                    updated: Date.now(),
                    tiers: [
                        { id: 't1', label: 'S', color: '#ff7f7f', items: [] },
                        { id: 't2', label: 'A', color: '#ffbf7f', items: [] },
                        { id: 't3', label: 'B', color: '#ffff7f', items: [] },
                        { id: 't4', label: 'C', color: '#7fff7f', items: [] },
                        { id: 't5', label: 'D', color: '#7fbfff', items: [] }
                    ],
                    pool: []
                };
                this.saveDb();
                this.openProject(id);
            },

            openProject(id) {
                this.currentId = id;
                document.getElementById('view-home').classList.remove('active');
                document.getElementById('view-editor').classList.add('active');
                
                const proj = this.data[id];
                document.getElementById('projectTitle').value = proj.title;
                
                this.renderEditor();
            },

            deleteProject(id) {
                if(confirm(dict[this.lang].confirmDel)) {
                    delete this.data[id];
                    this.saveDb();
                    this.renderHome();
                }
            },

            // --- EDITOR RENDER ---
            renderEditor() {
                const proj = this.data[this.currentId];
                const board = document.getElementById('mainBoard');
                const pool = document.getElementById('itemPool');
                
                // Clear existing
                board.innerHTML = '';
                pool.innerHTML = `<div class="drag-notice" id="t-dragNotice">${dict[this.lang].dragNotice}</div>`;

                // Render Tiers
                proj.tiers.forEach((tier, index) => {
                    const row = document.createElement('div');
                    row.className = 'tier-row';
                    row.innerHTML = `
                        <div class="tier-label-container">
                            <div class="tier-label" contenteditable="true" style="background-color: ${tier.color};" onblur="app.updateTierLabel(${index}, this.innerText)">${tier.label}</div>
                            <div class="tier-settings">
                                <button class="tier-btn" onclick="app.changeTierColor(${index})">🎨</button>
                                <button class="tier-btn" onclick="app.deleteTier(${index})">🗑️</button>
                            </div>
                        </div>
                        <div class="drop-zone" data-zone-type="tier" data-tier-idx="${index}"></div>
                    `;
                    
                    const zone = row.querySelector('.drop-zone');
                    this.setupDropZone(zone);
                    
                    // Render items in this tier
                    tier.items.forEach((item, iIdx) => {
                        zone.appendChild(this.createItemElement(item, 'tier', index, iIdx));
                    });

                    board.appendChild(row);
                });

                // Setup Pool drop zone
                this.setupDropZone(pool);
                pool.dataset.zoneType = 'pool';

                // Render items in pool
                proj.pool.forEach((item, idx) => {
                    pool.appendChild(this.createItemElement(item, 'pool', null, idx));
                });
            },

            // --- TIER MANAGEMENT ---
            addTier() {
                const proj = this.data[this.currentId];
                const color = defaultColors[proj.tiers.length % defaultColors.length];
                proj.tiers.push({ id: 't_'+Date.now(), label: 'NEW', color: color, items: [] });
                this.saveCurrent();
                this.renderEditor();
            },

            deleteTier(idx) {
                const proj = this.data[this.currentId];
                // Move items back to pool
                if(proj.tiers[idx].items.length > 0) {
                    proj.pool = proj.pool.concat(proj.tiers[idx].items);
                }
                proj.tiers.splice(idx, 1);
                this.saveCurrent();
                this.renderEditor();
            },

            changeTierColor(idx) {
                const colors = ['#ff7f7f', '#ffbf7f', '#ffff7f', '#7fff7f', '#7fbfff', '#bf7fff', '#111111', '#ffffff'];
                const proj = this.data[this.currentId];
                let currentIdx = colors.indexOf(proj.tiers[idx].color);
                proj.tiers[idx].color = colors[(currentIdx + 1) % colors.length];
                this.saveCurrent();
                this.renderEditor();
            },

            updateTierLabel(idx, text) {
                this.data[this.currentId].tiers[idx].label = text;
                this.saveCurrent();
            },

            // --- ITEM MANAGEMENT ---
            createItemElement(itemData, locType, tierIdx, itemIdx) {
                const div = document.createElement('div');
                div.className = 'item';
                div.draggable = true;
                
                // Store original location to handle logic on drop
                div.dataset.locType = locType;
                div.dataset.tierIdx = tierIdx;
                div.dataset.itemIdx = itemIdx;

                if (itemData.type === 'text') {
                    div.classList.add('text-item');
                    div.innerText = itemData.content;
                } else {
                    div.style.backgroundImage = `url(${itemData.content})`;
                }

                const delBtn = document.createElement('button');
                delBtn.className = 'delete-item';
                delBtn.innerText = 'X';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    this.deleteItem(locType, tierIdx, itemIdx);
                };
                div.appendChild(delBtn);

                // Drag events
                div.addEventListener('dragstart', (e) => {
                    this.draggedItem = div;
                    setTimeout(() => div.classList.add('dragging'), 0);
                });
                div.addEventListener('dragend', () => {
                    div.classList.remove('dragging');
                    this.draggedItem = null;
                });

                return div;
            },

            addTextItem() {
                const input = document.getElementById('textInput');
                const text = input.value.trim();
                if(!text) return;
                
                this.data[this.currentId].pool.push({ type: 'text', content: text });
                input.value = '';
                this.saveCurrent();
                this.renderEditor();
            },

            deleteItem(locType, tierIdx, itemIdx) {
                const proj = this.data[this.currentId];
                if(locType === 'pool') {
                    proj.pool.splice(itemIdx, 1);
                } else {
                    proj.tiers[tierIdx].items.splice(itemIdx, 1);
                }
                this.saveCurrent();
                this.renderEditor();
            },

            clearCurrentBoard() {
                if(confirm(dict[this.lang].confirmClear)) {
                    const proj = this.data[this.currentId];
                    proj.tiers.forEach(t => {
                        proj.pool = proj.pool.concat(t.items);
                        t.items = [];
                    });
                    this.saveCurrent();
                    this.renderEditor();
                }
            },

            // --- DRAG AND DROP ZONES ---
            setupDropZone(zone) {
                zone.addEventListener('dragover', e => {
                    e.preventDefault();
                    zone.classList.add('drag-over');
                });
                zone.addEventListener('dragleave', e => {
                    zone.classList.remove('drag-over');
                });
                zone.addEventListener('drop', e => {
                    e.preventDefault();
                    zone.classList.remove('drag-over');
                    
                    // IF it's an internal item drop
                    if(this.draggedItem) {
                        this.handleInternalDrop(this.draggedItem, zone);
                    } 
                    // IF it's a file dropped from OS
                    else if (e.dataTransfer.files.length > 0) {
                        this.handleFileDrop(e.dataTransfer.files);
                    }
                });
            },

            handleInternalDrop(itemEl, dropZone) {
                const proj = this.data[this.currentId];
                
                // Get original item data
                const sType = itemEl.dataset.locType;
                const sTier = itemEl.dataset.tierIdx;
                const sItem = itemEl.dataset.itemIdx;
                
                let itemObj;
                if(sType === 'pool') itemObj = proj.pool.splice(sItem, 1)[0];
                else itemObj = proj.tiers[sTier].items.splice(sItem, 1)[0];

                // Determine target
                const tType = dropZone.dataset.zoneType;
                if(tType === 'pool') {
                    proj.pool.push(itemObj);
                } else {
                    const tTier = dropZone.dataset.tierIdx;
                    proj.tiers[tTier].items.push(itemObj);
                }

                this.saveCurrent();
                this.renderEditor();
            },

            // --- IMAGE COMPRESSION & UPLOAD ---
            setupGlobalDragDrop() {
                // Prevent browser opening file if missed drop zone
                window.addEventListener('dragover', e => e.preventDefault());
                window.addEventListener('drop', e => e.preventDefault());
            },

            handleImageUpload(e) {
                this.handleFileDrop(e.target.files);
                e.target.value = '';
            },

            handleFileDrop(files) {
                if(!this.currentId) return;
                Array.from(files).forEach(file => {
                    if (file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = (event) => this.compressAndSaveImage(event.target.result);
                        reader.readAsDataURL(file);
                    }
                });
            },

            // Resizes image so localStorage doesn't crash immediately
            compressAndSaveImage(dataUrl) {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 150; // Tiers don't need HD
                    let w = img.width;
                    let h = img.height;

                    if (w > h && w > MAX_SIZE) {
                        h *= MAX_SIZE / w; w = MAX_SIZE;
                    } else if (h > MAX_SIZE) {
                        w *= MAX_SIZE / h; h = MAX_SIZE;
                    }

                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    
                    // 0.7 quality JPEG drastically reduces base64 string size
                    const compressedUrl = canvas.toDataURL('image/jpeg', 0.7);
                    
                    try {
                        this.data[this.currentId].pool.push({ type: 'image', content: compressedUrl });
                        this.saveCurrent();
                        this.renderEditor();
                    } catch (e) {
                        alert(dict[this.lang].alertQuota);
                    }
                };
                img.src = dataUrl;
            },

            // --- UTILS ---
            saveCurrent() {
                if(this.currentId) {
                    this.data[this.currentId].title = document.getElementById('projectTitle').value;
                    this.data[this.currentId].updated = Date.now();
                }
                this.saveDb();
            },

            saveDb() {
                try {
                    localStorage.setItem('finaltimeV3', JSON.stringify(this.data));
                } catch(e) {
                    alert(dict[this.lang].alertQuota);
                }
            },

            exportImage() {
                const area = document.getElementById('capture-area');
                html2canvas(area, { backgroundColor: '#09090b', scale: 2 }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = (this.data[this.currentId].title || 'TierList') + '.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                });
            },

            // --- I18N ---
            changeLanguage(l) {
                this.lang = l;
                localStorage.setItem('finaltimeLang', l);
                this.updateLangUI();
                if(this.currentId) this.renderEditor(); // Re-render to update dynamic text
            },

            updateLangUI() {
                const d = dict[this.lang];
                document.getElementById('t-myProjects').innerText = d.myProjects;
                document.getElementById('t-createNew').innerText = d.createNew;
                document.getElementById('t-home').innerText = d.home;
                document.getElementById('t-addImg').innerText = d.addImg;
                document.getElementById('t-addText').innerText = d.addText;
                document.getElementById('t-export').innerText = d.export;
                document.getElementById('t-clear').innerText = d.clear;
                document.getElementById('t-addTierRow').innerText = d.addTierRow;
                document.getElementById('t-poolTitle').innerText = d.poolTitle;
                
                const dragNotice = document.getElementById('t-dragNotice');
                if(dragNotice) dragNotice.innerText = d.dragNotice;
            }
        };

        // Boot
        window.onload = () => app.init();
    </script>
</body>
</html>
